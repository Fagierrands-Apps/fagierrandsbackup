name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        # Hostname only — no ftp:// prefix. Use cPanel → FTP Accounts → FTP Server.
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps
        port: 21
        # Relative to FTP login home (/home3/distinc3/), not a public URL
        server-dir: fagiserver.fagtone.com/
        log-level: verbose
        timeout: 120000
        exclude: |
          **/.git*
          **/.git*/**
          **/venv/**
          **/__pycache__/**
          **/*.pyc
          **/*.sqlite3
          **/staticfiles/**
          **/media/**
          **/.env
