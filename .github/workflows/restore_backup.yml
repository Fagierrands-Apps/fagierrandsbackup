name: Restore DB Backup to Supabase Postgres

on:
  schedule:
    - cron: '30 0 * * *'  # runs daily at 00:30 UTC (after cPanel backup at midnight)
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Download latest backup from Supabase Storage
        id: download
        run: |
          # Get list of backups and find the latest
          LATEST=$(curl -s \
            "${{ secrets.SUPABASE_PROJECT_URL }}/storage/v1/object/list/db-backups" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"limit": 100, "sortBy": {"column": "created_at", "order": "desc"}}' \
            | python3 -c "import sys,json; files=json.load(sys.stdin); print(files[0]['name']) if files else exit(1)")

          echo "Latest backup: $LATEST"
          echo "filename=$LATEST" >> $GITHUB_OUTPUT

          # Download the backup file
          curl -s \
            "${{ secrets.SUPABASE_PROJECT_URL }}/storage/v1/object/db-backups/$LATEST" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -o backup.sql.gz

          echo "Download complete. Size: $(du -sh backup.sql.gz | cut -f1)"

      - name: Restore to Supabase Postgres
        run: |
          export PGPASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"

          echo "Resetting public schema..."
          psql \
            -h "${{ secrets.SUPABASE_DB_HOST }}" \
            -p 5432 \
            -U postgres \
            -d postgres \
            -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

          echo "Restoring backup..."
          gunzip -c backup.sql.gz | psql \
            -h "${{ secrets.SUPABASE_DB_HOST }}" \
            -p 5432 \
            -U postgres \
            -d postgres

          echo "Restore complete."

      - name: Verify restore
        run: |
          export PGPASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"
          TABLE_COUNT=$(psql \
            -h "${{ secrets.SUPABASE_DB_HOST }}" \
            -p 5432 \
            -U postgres \
            -d postgres \
            -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';" | xargs)
          echo "Tables in Supabase Postgres after restore: $TABLE_COUNT"
