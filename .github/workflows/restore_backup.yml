name: Restore DB Backup to Supabase Postgres

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql and dns tools
        run: sudo apt-get install -y postgresql-client dnsutils

      - name: Get latest backup filename
        id: get_latest
        run: |
          curl -s \
            "${{ secrets.SUPABASE_PROJECT_URL }}/storage/v1/object/list/db-backups" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"prefix": "", "limit": 100, "sortBy": {"column": "created_at", "order": "desc"}}' \
            > /tmp/storage_list.json
          cat /tmp/storage_list.json
          python3 get_latest_backup.py > /tmp/latest.txt
          cat /tmp/latest.txt
          echo "filename=$(cat /tmp/latest.txt)" >> $GITHUB_OUTPUT

      - name: Download backup
        run: |
          curl -s \
            "${{ secrets.SUPABASE_PROJECT_URL }}/storage/v1/object/db-backups/$(cat /tmp/latest.txt)" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -o backup.sql.gz
          echo "Downloaded $(du -sh backup.sql.gz | cut -f1)"

      - name: Restore to Supabase Postgres
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          DB_IP=$(dig +short A "${{ secrets.SUPABASE_DB_HOST }}" | head -1)
          echo "Resolved to IPv4: $DB_IP"
          psql -h "$DB_IP" -p 5432 -U postgres -d postgres \
            -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          gunzip -c backup.sql.gz | psql \
            -h "$DB_IP" -p 5432 -U postgres -d postgres
          echo "Restore complete."

      - name: Verify restore
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          DB_IP=$(dig +short A "${{ secrets.SUPABASE_DB_HOST }}" | head -1)
          TABLE_COUNT=$(psql -h "$DB_IP" -p 5432 -U postgres -d postgres \
            -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';" | xargs)
          echo "Tables restored: $TABLE_COUNT"
