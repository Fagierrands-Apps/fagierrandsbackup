name: Restore DB Backup to Supabase Postgres

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Get latest backup filename
        id: get_latest
        run: |
          curl -s \
            "${{ secrets.SUPABASE_PROJECT_URL }}/storage/v1/object/list/db-backups" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"limit": 100, "sortBy": {"column": "created_at", "order": "desc"}}' \
            > /tmp/storage_list.json

          cat /tmp/storage_list.json

          LATEST=$(python3 -c "
import json
with open('/tmp/storage_list.json') as f:
    data = json.load(f)
files = data if isinstance(data, list) else []
if not files:
    raise Exception('No backup files found')
print(files[0]['name'])
")
          echo "Latest: $LATEST"
          echo "filename=$LATEST" >> $GITHUB_OUTPUT

      - name: Download backup from Supabase Storage
        run: |
          curl -s \
            "${{ secrets.SUPABASE_PROJECT_URL }}/storage/v1/object/db-backups/${{ steps.get_latest.outputs.filename }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -o backup.sql.gz
          echo "Downloaded: $(du -sh backup.sql.gz | cut -f1)"

      - name: Restore to Supabase Postgres
        run: |
          export PGPASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"
          psql -h "${{ secrets.SUPABASE_DB_HOST }}" -p 5432 -U postgres -d postgres \
            -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          gunzip -c backup.sql.gz | psql \
            -h "${{ secrets.SUPABASE_DB_HOST }}" -p 5432 -U postgres -d postgres
          echo "Restore complete."

      - name: Verify restore
        run: |
          export PGPASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"
          TABLE_COUNT=$(psql -h "${{ secrets.SUPABASE_DB_HOST }}" -p 5432 -U postgres -d postgres \
            -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';" | xargs)
          echo "Tables restored: $TABLE_COUNT"
